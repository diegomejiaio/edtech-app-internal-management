components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Clerk-issued JWT (RS256). Validated against CLERK_JWKS_URL.
        Send as `Authorization: Bearer <token>`.

  parameters:
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
    Offset:
      name: offset
      in: query
      schema: { type: integer, minimum: 0, default: 0 }
    IncludeInactive:
      name: includeInactive
      in: query
      description: When true, includes soft-deleted records (active=false).
      schema: { type: boolean, default: false }
    Query:
      name: q
      in: query
      description: Free-text search (server-side substring match across name and document number).
      schema: { type: string }
    EntityId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    CatalogCode:
      name: code
      in: path
      required: true
      schema: { type: string, examples: ["paymentMethods", "courses", "levels", "weekdays"] }
    IfMatch:
      name: If-Match
      in: header
      description: Cosmos `_etag` value. When provided, the update fails with 412 if the document changed.
      schema: { type: string }

  responses:
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/ProblemDetails" }
    Forbidden:
      description: Authenticated principal lacks required role.
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/ProblemDetails" }
    NotFound:
      description: Resource not found.
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/ProblemDetails" }
    Conflict:
      description: Generic business conflict.
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/ProblemDetails" }
    Duplicate:
      description: Unique constraint violation (e.g. existing docType+docNumber).
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/ProblemDetails" }
    PreconditionFailed:
      description: If-Match etag did not match current document version.
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/ProblemDetails" }
    ValidationFailed:
      description: Body failed validation. The `errors` map contains per-field messages.
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/ProblemDetails" }

  schemas:
    HealthResponse:
      type: object
      required: [status, version, timestamp]
      properties:
        status: { type: string, examples: ["ok"] }
        version: { type: string }
        timestamp: { type: string, format: date-time }

    ProblemDetails:
      type: object
      description: |
        RFC 7807 Problem Details with Espacio Pro extensions:
        `correlationId` (echoes `x-correlation-id`) and `errors` (422 only).
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
          examples:
            - urn:espaciopro:problem:not-found
            - urn:espaciopro:problem:duplicate
            - urn:espaciopro:problem:dependent-records
            - urn:espaciopro:problem:precondition-failed
            - urn:espaciopro:problem:validation
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
        correlationId: { type: string }
        errors:
          type: object
          additionalProperties:
            type: array
            items: { type: string }

    AuditUser:
      type: object
      required: [clerkUserId, email, displayName]
      properties:
        clerkUserId: { type: string }
        email: { type: string, format: email }
        displayName: { type: string }

    AuditFields:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        type: { type: string, readOnly: true }
        active: { type: boolean, readOnly: true }
        createdAt: { type: string, format: date-time, readOnly: true }
        createdBy:
          allOf: [{ $ref: "#/components/schemas/AuditUser" }]
          readOnly: true
        updatedAt: { type: string, format: date-time, readOnly: true }
        updatedBy:
          allOf: [{ $ref: "#/components/schemas/AuditUser" }]
          readOnly: true
        deletedAt:
          type: string
          format: date-time
          nullable: true
          readOnly: true
        deletedBy:
          allOf: [{ $ref: "#/components/schemas/AuditUser" }]
          nullable: true
          readOnly: true
        _etag:
          type: string
          description: Cosmos optimistic concurrency token.
          readOnly: true

    DocType:
      type: string
      enum: [dni, ce, passport]
    EnrollmentStatus:
      type: string
      enum: [active, completed, cancelled, pending]
    ScheduleStatus:
      type: string
      enum: [active, inProgress, finished, cancelled]
    ScheduleSessionStatus:
      type: string
      enum: [scheduled, completed, cancelled]
    AttendanceStatus:
      type: string
      enum: [pending, present, absent, late]

    PageMeta:
      type: object
      required: [total, limit, offset]
      properties:
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    CatalogSummary:
      type: object
      required: [code, count]
      properties:
        code: { type: string }
        count: { type: integer }

    CatalogItem:
      type: object
      required: [value, order, active]
      properties:
        value: { type: string }
        order: { type: integer }
        active: { type: boolean, default: true }
        metadata:
          type: object
          nullable: true
          additionalProperties: true

    Catalog:
      allOf:
        - $ref: "#/components/schemas/AuditFields"
        - type: object
          required: [code, items]
          properties:
            code: { type: string }
            items:
              type: array
              items: { $ref: "#/components/schemas/CatalogItem" }

    CatalogUpsert:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/CatalogItem" }

    Teacher:
      allOf:
        - $ref: "#/components/schemas/AuditFields"
        - type: object
          required: [firstName, lastName, docType, docNumber]
          properties:
            firstName: { type: string }
            lastName: { type: string }
            docType: { $ref: "#/components/schemas/DocType" }
            docNumber: { type: string }
            phone: { type: string, nullable: true }
            email: { type: string, format: email, nullable: true }
            specialty: { type: string, nullable: true }
            clerkUserId:
              type: string
              nullable: true
              description: Populated post-MVP for teacher login. Null in v1.

    TeacherCreate:
      type: object
      required: [firstName, lastName, docType, docNumber]
      properties:
        firstName: { type: string }
        lastName: { type: string }
        docType: { $ref: "#/components/schemas/DocType" }
        docNumber: { type: string }
        phone: { type: string, nullable: true }
        email: { type: string, format: email, nullable: true }
        specialty: { type: string, nullable: true }

    TeacherUpdate:
      $ref: "#/components/schemas/TeacherCreate"

    PagedTeachers:
      allOf:
        - $ref: "#/components/schemas/PageMeta"
        - type: object
          required: [items]
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/Teacher" }

    Student:
      allOf:
        - $ref: "#/components/schemas/AuditFields"
        - type: object
          required: [firstName, lastName, docType, docNumber]
          properties:
            firstName: { type: string }
            lastName: { type: string }
            docType: { $ref: "#/components/schemas/DocType" }
            docNumber: { type: string }
            phone: { type: string, nullable: true }
            email: { type: string, format: email, nullable: true }
            source:
              type: string
              nullable: true
              description: Free-form catalog reference to studentSources.
            notes: { type: string, nullable: true }

    StudentCreate:
      type: object
      required: [firstName, lastName, docType, docNumber]
      properties:
        firstName: { type: string }
        lastName: { type: string }
        docType: { $ref: "#/components/schemas/DocType" }
        docNumber: { type: string }
        phone: { type: string, nullable: true }
        email: { type: string, format: email, nullable: true }
        source: { type: string, nullable: true }
        notes: { type: string, nullable: true }

    StudentUpdate:
      $ref: "#/components/schemas/StudentCreate"

    PagedStudents:
      allOf:
        - $ref: "#/components/schemas/PageMeta"
        - type: object
          required: [items]
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/Student" }

    Schedule:
      allOf:
        - $ref: "#/components/schemas/AuditFields"
        - type: object
          required:
            - course
            - level
            - teacherId
            - teacherName
            - weekdays
            - startTime
            - endTime
            - price
            - capacity
            - status
            - startDate
          properties:
            course: { type: string }
            level: { type: string }
            teacherId: { type: string }
            teacherName:
              type: string
              description: Snapshot of teacher full name. Refreshed on PUT.
            weekdays: { type: string, examples: ["L-V", "S"] }
            startTime: { type: string, pattern: "^[0-2][0-9]:[0-5][0-9]$", examples: ["18:00"] }
            endTime: { type: string, pattern: "^[0-2][0-9]:[0-5][0-9]$", examples: ["20:00"] }
            price: { type: number }
            capacity: { type: integer, minimum: 0 }
            status: { $ref: "#/components/schemas/ScheduleStatus" }
            startDate: { type: string, format: date }
            courseDurationHours: { type: number, nullable: true }
            projectedEndDate: { type: string, format: date, nullable: true }
            sessions:
              type: array
              items: { $ref: "#/components/schemas/ScheduleSession" }

    ScheduleResponse:
      allOf:
        - $ref: "#/components/schemas/Schedule"
        - type: object
          properties:
            enrolledActiveCount:
              type: integer
              description: Computed at read time. Counts active enrollments only.
              readOnly: true
            occupancyPct:
              type: number
              description: enrolledActiveCount / capacity, rounded to 4 decimals. Zero if capacity = 0.
              readOnly: true
            sessionCount:
              type: integer
              readOnly: true

    ScheduleSession:
      type: object
      required: [id, sequenceNumber, date, startTime, endTime, status, attendance, active]
      properties:
        id: { type: string }
        sequenceNumber: { type: integer, minimum: 1 }
        date: { type: string, format: date }
        startTime: { type: string, pattern: "^[0-2][0-9]:[0-5][0-9]$" }
        endTime: { type: string, pattern: "^[0-2][0-9]:[0-5][0-9]$" }
        status: { $ref: "#/components/schemas/ScheduleSessionStatus" }
        attendance:
          type: array
          items: { $ref: "#/components/schemas/ScheduleAttendance" }
        active: { type: boolean }
        createdAt: { type: string, format: date-time }
        createdBy: { $ref: "#/components/schemas/AuditUser" }
        updatedAt: { type: string, format: date-time }
        updatedBy: { $ref: "#/components/schemas/AuditUser" }
        deletedAt: { type: string, format: date-time, nullable: true }
        deletedBy:
          allOf: [{ $ref: "#/components/schemas/AuditUser" }]
          nullable: true

    ScheduleAttendance:
      type: object
      required: [enrollmentId, studentId, studentName, status]
      properties:
        enrollmentId: { type: string }
        studentId: { type: string }
        studentName: { type: string }
        status: { $ref: "#/components/schemas/AttendanceStatus" }
        notes: { type: string, nullable: true }
        updatedAt: { type: string, format: date-time, nullable: true }
        updatedBy:
          allOf: [{ $ref: "#/components/schemas/AuditUser" }]
          nullable: true

    ScheduleSessionUpdate:
      type: object
      properties:
        status: { $ref: "#/components/schemas/ScheduleSessionStatus" }
        attendance:
          type: array
          items:
            type: object
            required: [studentId, status]
            properties:
              studentId: { type: string }
              status: { $ref: "#/components/schemas/AttendanceStatus" }
              notes: { type: string, nullable: true }

    ScheduleSessionUpdateResponse:
      type: object
      required: [session]
      properties:
        session: { $ref: "#/components/schemas/ScheduleSession" }
        scheduleEtag: { type: string, nullable: true }

    ScheduleCreate:
      type: object
      required:
        - course
        - level
        - teacherId
        - weekdays
        - startTime
        - endTime
        - price
        - capacity
        - status
        - startDate
      properties:
        course: { type: string }
        level: { type: string }
        teacherId: { type: string }
        weekdays: { type: string }
        startTime: { type: string, pattern: "^[0-2][0-9]:[0-5][0-9]$" }
        endTime: { type: string, pattern: "^[0-2][0-9]:[0-5][0-9]$" }
        price: { type: number }
        capacity: { type: integer, minimum: 0 }
        status: { $ref: "#/components/schemas/ScheduleStatus" }
        startDate: { type: string, format: date }

    ScheduleUpdate:
      $ref: "#/components/schemas/ScheduleCreate"

    PagedSchedules:
      allOf:
        - $ref: "#/components/schemas/PageMeta"
        - type: object
          required: [items]
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/ScheduleResponse" }

    PagedScheduleSessions:
      allOf:
        - $ref: "#/components/schemas/PageMeta"
        - type: object
          required: [items]
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/ScheduleSession" }

    Enrollment:
      allOf:
        - $ref: "#/components/schemas/AuditFields"
        - type: object
          required:
            - studentId
            - studentName
            - studentDoc
            - scheduleId
            - scheduleName
            - schedulePrice
            - enrollmentDate
            - status
          properties:
            studentId: { type: string }
            studentName: { type: string, description: Snapshot. Refreshed on PUT. }
            studentDoc: { type: string, description: 'Snapshot, e.g. "DNI 12345678". Refreshed on PUT.' }
            scheduleId: { type: string }
            scheduleName: { type: string, description: 'Snapshot, e.g. "Melamina · Intermedio · L-V 18:00". Refreshed on PUT.' }
            schedulePrice: { type: number, description: Snapshot. Refreshed on PUT. }
            enrollmentDate: { type: string, format: date }
            status: { $ref: "#/components/schemas/EnrollmentStatus" }

    EnrollmentCreate:
      type: object
      required: [studentId, scheduleId, enrollmentDate, status]
      properties:
        studentId: { type: string }
        scheduleId: { type: string }
        enrollmentDate: { type: string, format: date }
        status: { $ref: "#/components/schemas/EnrollmentStatus" }

    EnrollmentUpdate:
      $ref: "#/components/schemas/EnrollmentCreate"

    PagedEnrollments:
      allOf:
        - $ref: "#/components/schemas/PageMeta"
        - type: object
          required: [items]
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/Enrollment" }

    StudentPayment:
      allOf:
        - $ref: "#/components/schemas/AuditFields"
        - type: object
          required: [id, type, enrollmentId, studentId, studentName, scheduleId, scheduleName, date, amount, installmentNumber, paymentMethod, hasReceipt]
          properties:
            id: { type: string }
            type: { type: string, enum: [studentPayment] }
            enrollmentId: { type: string }
            studentId: { type: string, description: "Frozen snapshot at create time." }
            studentName: { type: string, description: "Frozen snapshot at create time." }
            scheduleId: { type: string, description: "Frozen snapshot at create time." }
            scheduleName: { type: string, description: "Frozen snapshot at create time." }
            date: { type: string, format: date }
            amount: { type: number, description: "Decimal monetary amount, > 0." }
            installmentNumber: { type: integer, minimum: 1 }
            paymentMethod: { type: string, description: "Catalog code for payment method." }
            hasReceipt: { type: boolean }
            receiptNumber: { type: string, nullable: true }
            notes: { type: string, nullable: true }

    StudentPaymentCreate:
      type: object
      required: [enrollmentId, date, amount, installmentNumber, paymentMethod, hasReceipt]
      properties:
        enrollmentId: { type: string, description: "Snapshots are derived from this enrollment." }
        date: { type: string, format: date }
        amount: { type: number }
        installmentNumber: { type: integer, minimum: 1 }
        paymentMethod: { type: string }
        hasReceipt: { type: boolean }
        receiptNumber: { type: string, nullable: true }
        notes: { type: string, nullable: true }

    StudentPaymentUpdate:
      description: |
        Snapshot fields (studentId, studentName, scheduleId, scheduleName, enrollmentId)
        are NOT accepted; they are frozen at create time.
      type: object
      required: [date, amount, installmentNumber, paymentMethod, hasReceipt]
      properties:
        date: { type: string, format: date }
        amount: { type: number }
        installmentNumber: { type: integer, minimum: 1 }
        paymentMethod: { type: string }
        hasReceipt: { type: boolean }
        receiptNumber: { type: string, nullable: true }
        notes: { type: string, nullable: true }

    PagedStudentPayments:
      allOf:
        - $ref: "#/components/schemas/PageMeta"
        - type: object
          required: [items]
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/StudentPayment" }

    DebtorReport:
      type: object
      required: [scheduleId, scheduleName, month, debtors]
      properties:
        scheduleId: { type: string }
        scheduleName: { type: string }
        month: { type: string, pattern: "^[0-9]{4}-(0[1-9]|1[0-2])$" }
        debtors:
          type: array
          items: { $ref: "#/components/schemas/DebtorRow" }

    DebtorRow:
      type: object
      required: [enrollmentId, studentId, studentName, studentDoc]
      properties:
        enrollmentId: { type: string }
        studentId: { type: string }
        studentName: { type: string }
        studentDoc: { type: string, description: "Concatenated docType + docNumber for display." }
        lastPaymentDate:
          type: string
          format: date
          nullable: true
          description: |
            Always null in this report (debtors are exactly those with no payment in the month).
            Reserved for forward compatibility.

    ScheduleDashboardResponse:
      type: object
      required: [schedule, month, enrollments, summary]
      description: Composite read view powering the M9 schedule dashboard. See `docs/04-api-design.md` §6.1.
      properties:
        schedule: { $ref: "#/components/schemas/ScheduleResponse" }
        month: { type: string, pattern: "^[0-9]{4}-(0[1-9]|1[0-2])$" }
        enrollments:
          type: array
          items: { $ref: "#/components/schemas/ScheduleDashboardEnrollment" }
        summary: { $ref: "#/components/schemas/ScheduleDashboardSummary" }

    ScheduleDashboardEnrollment:
      type: object
      required: [enrollmentId, studentId, studentName, studentDoc, paidThisMonth]
      properties:
        enrollmentId: { type: string }
        studentId: { type: string }
        studentName: { type: string }
        studentDoc: { type: string, description: "Concatenated docType + docNumber for display." }
        paidThisMonth: { type: boolean }
        lastPaymentDate:
          type: string
          format: date
          nullable: true
          description: Most recent active payment date within the month, or null if none.

    ScheduleDashboardSummary:
      type: object
      required: [enrolled, paid, debtors, occupancyPct, sessions, completedSessions, pendingSessions]
      properties:
        enrolled: { type: integer, minimum: 0 }
        paid: { type: integer, minimum: 0 }
        debtors: { type: integer, minimum: 0 }
        occupancyPct:
          type: number
          format: double
          minimum: 0
          description: Ratio enrolled/capacity rounded to 4 decimals. 0 when capacity is 0.
        sessions: { type: integer, minimum: 0 }
        completedSessions: { type: integer, minimum: 0 }
        pendingSessions: { type: integer, minimum: 0 }

    TeacherPayment:
      allOf:
        - $ref: "#/components/schemas/AuditFields"
        - type: object
          required: [id, type, teacherId, teacherName, teacherDoc, date, amount, concept, paymentMethod]
          properties:
            id: { type: string }
            type: { type: string, enum: [teacherPayment] }
            teacherId: { type: string }
            teacherName: { type: string, description: "Frozen snapshot at create time." }
            teacherDoc: { type: string, description: "Frozen snapshot of doc type + number at create time." }
            date: { type: string, format: date }
            amount: { type: number }
            concept: { type: string }
            paymentMethod: { type: string }
            notes: { type: string, nullable: true }

    TeacherPaymentCreate:
      type: object
      required: [teacherId, date, amount, concept, paymentMethod]
      properties:
        teacherId: { type: string }
        date: { type: string, format: date }
        amount: { type: number }
        concept: { type: string }
        paymentMethod: { type: string }
        notes: { type: string, nullable: true }

    TeacherPaymentUpdate:
      description: |
        Snapshot fields (teacherId, teacherName, teacherDoc) are NOT accepted;
        they are frozen at create time.
      type: object
      required: [date, amount, concept, paymentMethod]
      properties:
        date: { type: string, format: date }
        amount: { type: number }
        concept: { type: string }
        paymentMethod: { type: string }
        notes: { type: string, nullable: true }

    PagedTeacherPayments:
      allOf:
        - $ref: "#/components/schemas/PageMeta"
        - type: object
          required: [items]
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/TeacherPayment" }

    Expense:
      allOf:
        - $ref: "#/components/schemas/AuditFields"
        - type: object
          required: [id, type, date, category, description, amount, paymentMethod]
          properties:
            id: { type: string }
            type: { type: string, enum: [expense] }
            date: { type: string, format: date }
            category: { type: string }
            description: { type: string }
            amount: { type: number }
            paymentMethod: { type: string }
            scheduleId:
              type: string
              nullable: true
              description: "Optional schedule imputation."
            scheduleName:
              type: string
              nullable: true
              description: "Frozen snapshot when scheduleId is set."

    ExpenseCreate:
      type: object
      required: [date, category, description, amount, paymentMethod]
      properties:
        date: { type: string, format: date }
        category: { type: string }
        description: { type: string }
        amount: { type: number }
        paymentMethod: { type: string }
        scheduleId:
          type: string
          nullable: true
          description: "When provided, scheduleName is captured as a frozen snapshot."

    ExpenseUpdate:
      description: |
        scheduleId and its snapshot scheduleName are preserved as a unit and cannot be
        modified. To re-point or clear the imputation, soft-delete and recreate.
      type: object
      required: [date, category, description, amount, paymentMethod]
      properties:
        date: { type: string, format: date }
        category: { type: string }
        description: { type: string }
        amount: { type: number }
        paymentMethod: { type: string }

    PagedExpenses:
      allOf:
        - $ref: "#/components/schemas/PageMeta"
        - type: object
          required: [items]
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/Expense" }
