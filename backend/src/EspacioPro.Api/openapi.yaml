openapi: 3.1.0
info:
  title: Espacio Pro v1 — Internal Management API
  version: 1.0.0
  description: |
    Internal management backend (enrollments, schedules, payments) for an art/craft school.
    Migration target from a Google Apps Script + Sheets system.

    Hand-authored spec (single source of truth). Served at:
      - GET /api/v1/openapi.yaml  — this file, raw
      - GET /api/v1/openapi.json  — parsed and re-serialized as JSON

    See `docs/06-openapi-pipeline.md` for the FE codegen pipeline.

  contact:
    name: Espacio Pro
  license:
    name: Internal
servers:
  - url: http://localhost:7071/api
    description: Local Functions runtime
  - url: https://{hostname}/api
    description: Azure Static Web Apps custom backend mapping
    variables:
      hostname:
        default: app.example.com

tags:
  - name: Health
    description: Liveness probe.
  - name: Catalogs
    description: Master configuration lists (payment methods, courses, levels, weekdays, etc.).
  - name: Teachers
    description: Teacher master records.
  - name: Students
    description: Student master records.
  - name: Schedules
    description: Class offerings (course + level + weekdays + price + capacity).
  - name: Enrollments
    description: Student-to-Schedule assignments. Operations container.
  - name: StudentPayments
    description: Payments by students against an enrollment. Operations container. Snapshots frozen.
  - name: TeacherPayments
    description: Payments to teachers (no schedule FK by design). Operations container. Snapshots frozen.
  - name: Expenses
    description: Operating expenses. Optional schedule imputation. Operations container.

security:
  - bearerAuth: []

paths:
  /v1/health:
    get:
      tags: [Health]
      summary: Liveness probe
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Backend is running.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /v1/catalogs:
    get:
      tags: [Catalogs]
      summary: List all catalog codes
      operationId: listCatalogs
      responses:
        "200":
          description: Array of catalog summaries.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CatalogSummary" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/schedules/{id}/sessions:
    parameters:
      - $ref: "#/components/parameters/EntityId"
    get:
      tags: [Schedules]
      summary: List generated sessions for a schedule
      operationId: listScheduleSessions
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
        - name: status
          in: query
          schema: { $ref: "#/components/schemas/ScheduleSessionStatus" }
      responses:
        "200":
          description: Page of generated sessions.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PagedScheduleSessions" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationFailed" }

  /v1/schedules/{scheduleId}/sessions/{sessionId}:
    parameters:
      - name: scheduleId
        in: path
        required: true
        schema: { type: string }
      - name: sessionId
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Schedules]
      summary: Get a generated session
      operationId: getScheduleSession
      responses:
        "200":
          description: Generated session.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScheduleSession" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [Schedules]
      summary: Update a generated session status or attendance
      operationId: updateScheduleSession
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ScheduleSessionUpdate" }
      responses:
        "200":
          description: Updated session and the new parent schedule ETag.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScheduleSessionUpdateResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }

  /v1/catalogs/{code}:
    parameters:
      - $ref: "#/components/parameters/CatalogCode"
    get:
      tags: [Catalogs]
      summary: Get a catalog by code
      operationId: getCatalog
      responses:
        "200":
          description: The catalog document.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Catalog" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [Catalogs]
      summary: Replace a catalog (full upsert)
      operationId: putCatalog
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CatalogUpsert" }
      responses:
        "200":
          description: Catalog upserted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Catalog" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationFailed" }

  /v1/catalogs/{code}/items:
    parameters:
      - $ref: "#/components/parameters/CatalogCode"
    post:
      tags: [Catalogs]
      summary: Append an item to a catalog
      operationId: addCatalogItem
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CatalogItem" }
      responses:
        "201":
          description: Item created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Catalog" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationFailed" }

  /v1/catalogs/{code}/items/{value}:
    parameters:
      - $ref: "#/components/parameters/CatalogCode"
      - name: value
        in: path
        required: true
        schema: { type: string }
    delete:
      tags: [Catalogs]
      summary: Remove (deactivate) a catalog item
      operationId: removeCatalogItem
      responses:
        "204": { description: Item removed. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/teachers:
    get:
      tags: [Teachers]
      summary: List teachers
      operationId: listTeachers
      parameters:
        - $ref: "#/components/parameters/Query"
        - name: docType
          in: query
          schema: { $ref: "#/components/schemas/DocType" }
        - $ref: "#/components/parameters/IncludeInactive"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Page of teachers.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedTeachers"
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [Teachers]
      summary: Create a teacher
      operationId: createTeacher
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TeacherCreate" }
      responses:
        "201":
          description: Teacher created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Teacher" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Duplicate" }
        "422": { $ref: "#/components/responses/ValidationFailed" }

  /v1/teachers/{id}:
    parameters:
      - $ref: "#/components/parameters/EntityId"
    get:
      tags: [Teachers]
      summary: Get a teacher by id
      operationId: getTeacher
      responses:
        "200":
          description: Teacher.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Teacher" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [Teachers]
      summary: Replace a teacher (full update)
      operationId: updateTeacher
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TeacherUpdate" }
      responses:
        "200":
          description: Teacher updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Teacher" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Duplicate" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
    delete:
      tags: [Teachers]
      summary: Soft delete a teacher
      operationId: deleteTeacher
      responses:
        "204": { description: Teacher soft-deleted. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Teacher is assigned to one or more active or in-progress schedules.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }

  /v1/students:
    get:
      tags: [Students]
      summary: List students
      operationId: listStudents
      parameters:
        - $ref: "#/components/parameters/Query"
        - name: docType
          in: query
          schema: { $ref: "#/components/schemas/DocType" }
        - $ref: "#/components/parameters/IncludeInactive"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Page of students.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedStudents"
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [Students]
      summary: Create a student
      operationId: createStudent
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StudentCreate" }
      responses:
        "201":
          description: Student created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Student" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Duplicate" }
        "422": { $ref: "#/components/responses/ValidationFailed" }

  /v1/students/{id}:
    parameters:
      - $ref: "#/components/parameters/EntityId"
    get:
      tags: [Students]
      summary: Get a student by id
      operationId: getStudent
      responses:
        "200":
          description: Student.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Student" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [Students]
      summary: Replace a student (full update)
      operationId: updateStudent
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StudentUpdate" }
      responses:
        "200":
          description: Student updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Student" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Duplicate" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
    delete:
      tags: [Students]
      summary: Soft delete a student
      operationId: deleteStudent
      responses:
        "204": { description: Student soft-deleted. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Student has one or more active enrollments.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }

  /v1/students/{studentId}/enrollments:
    parameters:
      - name: studentId
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Enrollments]
      summary: List enrollments for a student
      operationId: listStudentEnrollments
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Page of enrollments for the student.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PagedEnrollments" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/schedules:
    get:
      tags: [Schedules]
      summary: List schedules
      operationId: listSchedules
      parameters:
        - name: status
          in: query
          schema: { $ref: "#/components/schemas/ScheduleStatus" }
        - name: teacherId
          in: query
          schema: { type: string }
        - name: course
          in: query
          schema: { type: string }
        - $ref: "#/components/parameters/IncludeInactive"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Page of schedules with computed enrollment metrics.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PagedSchedules" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [Schedules]
      summary: Create a schedule
      operationId: createSchedule
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ScheduleCreate" }
      responses:
        "201":
          description: Schedule created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScheduleResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Referenced teacher does not exist.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }
        "422": { $ref: "#/components/responses/ValidationFailed" }

  /v1/schedules/{id}:
    parameters:
      - $ref: "#/components/parameters/EntityId"
    get:
      tags: [Schedules]
      summary: Get a schedule by id
      operationId: getSchedule
      responses:
        "200":
          description: Schedule.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScheduleResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [Schedules]
      summary: Replace a schedule (full update; refreshes teacherName snapshot)
      operationId: updateSchedule
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ScheduleUpdate" }
      responses:
        "200":
          description: Schedule updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScheduleResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
    delete:
      tags: [Schedules]
      summary: Soft delete a schedule
      operationId: deleteSchedule
      responses:
        "204": { description: Schedule soft-deleted. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Schedule has one or more active enrollments.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }

  /v1/schedules/{id}/dashboard:
    parameters:
      - $ref: "#/components/parameters/EntityId"
    get:
      tags: [Schedules]
      summary: Schedule dashboard view (M9)
      description: |
        Composite view of a schedule for a given month: schedule info, active enrollments,
        and a per-enrollment paid/debtor flag plus aggregate summary. See
        `docs/04-api-design.md` §6.1.
      operationId: getScheduleDashboard
      parameters:
        - name: month
          in: query
          required: false
          description: Year-month in `YYYY-MM` format. Defaults to the current UTC month when omitted.
          schema: { type: string, pattern: "^[0-9]{4}-(0[1-9]|1[0-2])$" }
      responses:
        "200":
          description: Schedule dashboard for the requested month.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScheduleDashboardResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationFailed" }

  /v1/schedules/{scheduleId}/enrollments:
    parameters:
      - name: scheduleId
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Enrollments]
      summary: List enrollments for a schedule
      operationId: listScheduleEnrollments
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Page of enrollments for the schedule.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PagedEnrollments" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/enrollments:
    get:
      tags: [Enrollments]
      summary: List enrollments
      operationId: listEnrollments
      parameters:
        - name: studentId
          in: query
          schema: { type: string }
        - name: scheduleId
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { $ref: "#/components/schemas/EnrollmentStatus" }
        - $ref: "#/components/parameters/IncludeInactive"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Page of enrollments.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PagedEnrollments" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [Enrollments]
      summary: Create an enrollment (snapshots student + schedule)
      operationId: createEnrollment
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EnrollmentCreate" }
      responses:
        "201":
          description: Enrollment created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Enrollment" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Referenced student or schedule does not exist.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }
        "409":
          description: Active enrollment already exists for this (student, schedule) pair.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }
        "422": { $ref: "#/components/responses/ValidationFailed" }

  /v1/enrollments/{id}:
    parameters:
      - $ref: "#/components/parameters/EntityId"
    get:
      tags: [Enrollments]
      summary: Get an enrollment by id
      operationId: getEnrollment
      responses:
        "200":
          description: Enrollment.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Enrollment" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [Enrollments]
      summary: Replace an enrollment (refreshes student + schedule snapshots)
      operationId: updateEnrollment
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EnrollmentUpdate" }
      responses:
        "200":
          description: Enrollment updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Enrollment" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
    delete:
      tags: [Enrollments]
      summary: Soft delete an enrollment
      operationId: deleteEnrollment
      responses:
        "204": { description: Enrollment soft-deleted. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/student-payments:
    get:
      tags: [StudentPayments]
      summary: List student payments
      operationId: listStudentPayments
      parameters:
        - name: enrollmentId
          in: query
          schema: { type: string }
        - name: studentId
          in: query
          schema: { type: string }
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
        - $ref: "#/components/parameters/IncludeInactive"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Page of student payments.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PagedStudentPayments" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [StudentPayments]
      summary: Create a student payment (snapshots student + schedule from enrollment, frozen)
      operationId: createStudentPayment
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StudentPaymentCreate" }
      responses:
        "201":
          description: Payment created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StudentPayment" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationFailed" }

  /v1/student-payments/debtors:
    get:
      tags: [StudentPayments]
      summary: List debtors for a schedule and month (operational endpoint)
      description: |
        Active enrollments in `scheduleId` that have no active payment in the given
        month. Used by the M9 dashboard and the M6 debtors view. See
        `docs/04-api-design.md` §6.2.
      operationId: listStudentPaymentDebtors
      parameters:
        - name: scheduleId
          in: query
          required: true
          schema: { type: string }
        - name: month
          in: query
          required: true
          description: Year-month in `YYYY-MM` format.
          schema: { type: string, pattern: "^[0-9]{4}-(0[1-9]|1[0-2])$" }
      responses:
        "200":
          description: Debtor report for the schedule and month.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DebtorReport" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationFailed" }

  /v1/student-payments/{id}:
    parameters:
      - $ref: "#/components/parameters/EntityId"
    get:
      tags: [StudentPayments]
      summary: Get a student payment by id
      operationId: getStudentPayment
