name: Bug Report
description: Report a bug in Espacio Pro
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Fill in the details below.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line description of the bug.
      placeholder: "e.g., Enrollment creation returns 500 when schedule is inactive"
    validations:
      required: true

  - type: dropdown
    id: layer
    attributes:
      label: Affected Layer
      options:
        - Frontend (Next.js)
        - Backend (Azure Functions / .NET)
        - Database (Cosmos DB)
        - Auth (Clerk)
        - Infrastructure
        - Unknown
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Navigate to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens (include error messages, status codes, logs).
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, request/response payloads, browser info, etc.
    validations:
      required: false
