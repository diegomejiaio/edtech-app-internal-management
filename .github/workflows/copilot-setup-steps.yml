name: "Copilot Setup Steps"

# Preinstalls the Espacio Pro toolchain (.NET 10, pnpm/Node, Playwright) in the
# Copilot coding agent's ephemeral environment so it can restore, build, and test
# without slow trial-and-error dependency discovery.
#
# Runs automatically when this file changes (for easy validation) and can be run
# manually from the repository's "Actions" tab. The agent picks up these steps
# only once the file is present on the default branch.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be named `copilot-setup-steps` or Copilot will not pick it up.
  copilot-setup-steps:
    name: Preinstall dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Lowest permissions needed: read-only checkout to install dependencies.
    # Copilot receives its own token for its work after these steps complete.
    permissions:
      contents: read

    env:
      DOTNET_NOLOGO: "true"
      DOTNET_CLI_TELEMETRY_OPTOUT: "true"
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # ----- Backend: .NET 10 (preview) -----
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Restore backend (warms NuGet cache)
        working-directory: backend
        run: dotnet restore EspacioPro.slnx

      # ----- Frontend: pnpm 10 + Node 22 -----
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      # ----- E2E: Playwright (Chromium only, keeps setup lean) -----
      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: e2e
        run: npx playwright install --with-deps chromium
