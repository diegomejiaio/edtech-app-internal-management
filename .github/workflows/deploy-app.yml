name: deploy-app

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-app-production
  cancel-in-progress: false

env:
  ESPACIOPRO_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
  NEXT_PUBLIC_CLERK_ORG_ID: ${{ vars.NEXT_PUBLIC_CLERK_ORG_ID }}

jobs:
  deploy:
    name: Deploy backend and frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Static Web Apps CLI
        run: npm install --global @azure/static-web-apps-cli

      - name: Validate deployment config
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          if [ -z "${AZURE_CLIENT_ID}" ]; then
            echo "AZURE_CLIENT_ID repository secret is required." >&2
            exit 1
          fi
          if [ -z "${AZURE_TENANT_ID}" ]; then
            echo "AZURE_TENANT_ID repository secret is required." >&2
            exit 1
          fi
          if [ -z "${AZURE_SUBSCRIPTION_ID}" ]; then
            echo "AZURE_SUBSCRIPTION_ID repository secret is required." >&2
            exit 1
          fi
          if [ -z "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}" ]; then
            echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY repository variable is required." >&2
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy backend and frontend
        run: ./infra/deploy-app.sh --apply
