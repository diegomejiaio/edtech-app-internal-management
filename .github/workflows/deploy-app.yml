name: deploy-app

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: Deploy backend Function App
        type: boolean
        default: true
      deploy_frontend:
        description: Deploy frontend Static Web App
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-app-production
  cancel-in-progress: false

env:
  ESPACIOPRO_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
  NEXT_PUBLIC_CLERK_ORG_ID: ${{ vars.NEXT_PUBLIC_CLERK_ORG_ID }}

jobs:
  detect-changes:
    name: Detect changed components
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.detect.outputs.backend }}
      frontend: ${{ steps.detect.outputs.frontend }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect backend/frontend changes
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
          DEPLOY_BACKEND_INPUT: ${{ inputs.deploy_backend }}
          DEPLOY_FRONTEND_INPUT: ${{ inputs.deploy_frontend }}
        run: |
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "backend=${DEPLOY_BACKEND_INPUT}" >> "${GITHUB_OUTPUT}"
            echo "frontend=${DEPLOY_FRONTEND_INPUT}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ -z "${BEFORE_SHA}" ] || [[ "${BEFORE_SHA}" =~ ^0+$ ]]; then
            git diff-tree --no-commit-id --name-only -r "${CURRENT_SHA}" > changed-files.txt
          else
            git diff --name-only "${BEFORE_SHA}" "${CURRENT_SHA}" > changed-files.txt
          fi

          echo "Changed files:"
          cat changed-files.txt

          if grep -Eq '^(backend/|infra/deploy-app\.sh|\.github/workflows/deploy-app\.yml)' changed-files.txt; then
            echo "backend=true" >> "${GITHUB_OUTPUT}"
          else
            echo "backend=false" >> "${GITHUB_OUTPUT}"
          fi

          if grep -Eq '^(frontend/|infra/deploy-app\.sh|\.github/workflows/deploy-app\.yml)' changed-files.txt; then
            echo "frontend=true" >> "${GITHUB_OUTPUT}"
          else
            echo "frontend=false" >> "${GITHUB_OUTPUT}"
          fi

  backend-ci:
    name: Validate backend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore backend
        working-directory: backend
        run: dotnet restore EspacioPro.slnx

      - name: Verify backend formatting
        working-directory: backend
        run: dotnet format EspacioPro.slnx --verify-no-changes --severity warn

      - name: Build backend
        working-directory: backend
        run: dotnet build EspacioPro.slnx --configuration Release --no-restore

      - name: Test backend
        working-directory: backend
        run: dotnet test EspacioPro.slnx --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-backend-test-results
          path: backend/**/TestResults/*.trx

  frontend-ci:
    name: Validate frontend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Validate frontend build config
        run: |
          if [ -z "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}" ]; then
            echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY repository variable is required." >&2
            exit 1
          fi

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile --silent

      - name: Test frontend
        working-directory: frontend
        run: pnpm test

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://func-espaciopro-prod-eus2.azurewebsites.net
          NEXT_PUBLIC_API_VERSION: v1
          NEXT_PUBLIC_DEV_MODE: "false"
        run: pnpm build

  deploy-backend:
    name: Deploy backend
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - backend-ci
    if: needs.detect-changes.outputs.backend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Validate Azure deployment config
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          if [ -z "${AZURE_CLIENT_ID}" ]; then
            echo "AZURE_CLIENT_ID repository secret is required." >&2
            exit 1
          fi
          if [ -z "${AZURE_TENANT_ID}" ]; then
            echo "AZURE_TENANT_ID repository secret is required." >&2
            exit 1
          fi
          if [ -z "${AZURE_SUBSCRIPTION_ID}" ]; then
            echo "AZURE_SUBSCRIPTION_ID repository secret is required." >&2
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy backend Function App
        run: ./infra/deploy-app.sh --apply --backend

  deploy-frontend:
    name: Deploy frontend
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - frontend-ci
    if: needs.detect-changes.outputs.frontend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Static Web Apps CLI
        run: npm install --global @azure/static-web-apps-cli

      - name: Validate deployment config
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          if [ -z "${AZURE_CLIENT_ID}" ]; then
            echo "AZURE_CLIENT_ID repository secret is required." >&2
            exit 1
          fi
          if [ -z "${AZURE_TENANT_ID}" ]; then
            echo "AZURE_TENANT_ID repository secret is required." >&2
            exit 1
          fi
          if [ -z "${AZURE_SUBSCRIPTION_ID}" ]; then
            echo "AZURE_SUBSCRIPTION_ID repository secret is required." >&2
            exit 1
          fi
          if [ -z "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}" ]; then
            echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY repository variable is required." >&2
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy frontend Static Web App
        run: ./infra/deploy-app.sh --apply --frontend
